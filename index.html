<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Bia · Assistente Psicopedagógica, Passos Mágicos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bia: {
              bg:    '#F7F4FF',
              light: '#EDE9FE',
              mid:   '#C4B5FD',
              base:  '#7C3AED',
              deep:  '#6D28D9',
              ink:   '#1E1B2E',
              muted: '#64748B',
            }
          },
          animation: {
            'slide-up': 'slideUp 0.25s ease-out',
            'fade-in':  'fadeIn 0.2s ease-out',
          },
          keyframes: {
            slideUp: { from: { transform: 'translateY(10px)', opacity: '0' }, to: { transform: 'translateY(0)', opacity: '1' } },
            fadeIn:  { from: { opacity: '0' },                                to: { opacity: '1' } },
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    /* ── Full-height flex layout — keyboard-safe ── */
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background-color: #F7F4FF;
      overscroll-behavior: none;
    }

    /* ── Bubbles ── */
    .user-bubble {
      background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
      box-shadow: 0 2px 8px rgba(124,58,237,0.22);
    }
    .bot-bubble {
      background: #fff;
      border: 1px solid #E9D5FF;
      box-shadow: 0 1px 4px rgba(124,58,237,0.07);
    }

    /* ── Typing dots ── */
    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0);    opacity: 0.4; }
      30%           { transform: translateY(-6px); opacity: 1;   }
    }
    .dot {
      width: 8px; height: 8px;
      background: #A78BFA;
      border-radius: 50%;
      display: inline-block;
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar       { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #C4B5FD; border-radius: 2px; }

    /* ── Markdown ── */
    .md ul     { list-style: disc; padding-left: 1.25rem; }
    .md li     { margin-bottom: 0.2rem; }
    .md strong { color: #7C3AED; font-weight: 600; }
    .md em     { color: #6D28D9; font-style: italic; }
    .md h3     { color: #6D28D9; font-weight: 700; font-size: 0.9rem; margin: 0.5rem 0 0.2rem; }
    .md code   { background: #EDE9FE; color: #7C3AED; padding: 1px 5px; border-radius: 4px; font-size: 0.78em; }
    .md table  { border-collapse: collapse; width: 100%; margin: 0.4rem 0; font-size: 0.78rem; }
    .md td     { padding: 4px 8px; border: 1px solid #E9D5FF; }

    /* ── Input focus ring ── */
    .input-ring { transition: border-color 0.18s, box-shadow 0.18s; }
    .input-ring:focus-within { border-color: #A78BFA !important; box-shadow: 0 0 0 3px #EDE9FE; }

    /* ── Online dot ── */
    .online-dot {
      width: 11px; height: 11px;
      background: #22C55E;
      border-radius: 50%;
      border: 2px solid #fff;
      animation: onlinePulse 2.4s ease-in-out infinite;
    }
    @keyframes onlinePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Emoji panel ── */
    #emoji-panel {
      display: none;
      flex-wrap: wrap;
      gap: 2px;
      background: #fff;
      border: 1px solid #E9D5FF;
      border-radius: 14px;
      padding: 8px;
      box-shadow: 0 -4px 16px rgba(124,58,237,0.1);
    }
    #emoji-panel.open { display: flex; }
    #emoji-panel button {
      width: 36px; height: 36px;
      font-size: 1.15rem;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
      line-height: 1;
      touch-action: manipulation;
    }
    #emoji-panel button:hover { background: #EDE9FE; }

    /* ── Emoji trigger ── */
    .emoji-trigger { color: #C4B5FD; transition: color 0.15s; }
    .emoji-trigger:hover { color: #7C3AED; }

    /* ── Textarea: font-size 16px prevents iOS zoom-on-focus ── */
    textarea {
      font-size: 16px !important;
      line-height: 1.45;
    }

    /* ── Buttons: fast tap ── */
    button { touch-action: manipulation; }

    /* ── Misc ── */
    .send-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .no-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .no-scroll::-webkit-scrollbar { display: none; }
    textarea:focus { outline: none; }
  </style>
</head>

<!-- flex column fills 100dvh; header + footer shrink, main grows -->
<body class="font-sans">

  <!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
  <header class="flex-shrink-0 z-20 bg-white/95 backdrop-blur-sm border-b border-purple-100 shadow-sm"
          style="height:64px">
    <div class="max-w-2xl mx-auto h-full px-4 flex items-center gap-3">
      <div class="relative flex-shrink-0">
        <img src="/bia_avatar.png" alt="Bia" class="w-11 h-11 select-none">
        <span class="online-dot absolute -bottom-0.5 -right-0.5"></span>
      </div>
      <div>
        <p class="font-bold text-bia-ink text-[15px] leading-tight">Bia</p>
        <p class="text-[11px] text-green-500 font-medium leading-tight">Online agora</p>
      </div>
    </div>
  </header>

  <!-- ══ CHAT (scrollable, fills remaining space) ════════════════════════ -->
  <main id="chat-scroll"
        class="flex-1 min-h-0 overflow-y-auto"
        style="-webkit-overflow-scrolling: touch; overscroll-behavior: contain;">
    <div class="max-w-2xl mx-auto px-4">
      <div id="chat" class="flex flex-col gap-3 py-4 pr-1 select-text"></div>
    </div>
  </main>

  <!-- ══ ERROR TOAST ══════════════════════════════════════════════════════ -->
  <div id="error-toast"
       class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 animate-fade-in
              bg-red-50 border border-red-200 text-red-600 text-xs
              px-4 py-2 rounded-xl shadow-lg max-w-xs text-center">
  </div>

  <!-- ══ INPUT BAR (flex footer, keyboard-aware) ═════════════════════════ -->
  <footer class="flex-shrink-0 z-10 bg-bia-bg border-t border-purple-100"
          style="padding-bottom: env(safe-area-inset-bottom, 0px)">
    <div class="max-w-2xl mx-auto px-4 pt-2 pb-3 relative">

      <!-- Emoji panel: absolute, floats above bar -->
      <div id="emoji-panel" class="absolute bottom-full left-4 right-4 mb-1 z-30
                                   overflow-y-auto" style="max-height:180px"></div>

      <!-- Quick prompts -->
      <div id="quick-prompts" class="flex gap-2 overflow-x-auto no-scroll pb-2.5"></div>

      <!-- Input row -->
      <div class="flex gap-2 items-end">
        <div class="input-ring flex-1 bg-white border border-purple-200 rounded-2xl overflow-hidden flex items-end">

          <!-- Emoji trigger -->
          <button id="emoji-btn" onclick="toggleEmoji(event)"
                  class="emoji-trigger flex-shrink-0 px-3 pb-[11px] select-none"
                  title="Emojis">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <circle cx="9"  cy="9"  r="0.8" fill="currentColor" stroke="none"/>
              <circle cx="15" cy="9"  r="0.8" fill="currentColor" stroke="none"/>
            </svg>
          </button>

          <textarea id="msg-input"
            rows="1"
            placeholder="Digite sua mensagem..."
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
            class="flex-1 bg-transparent text-bia-ink px-1 py-3 resize-none outline-none
                   placeholder-gray-400 leading-relaxed select-text"
            style="max-height:120px"></textarea>
        </div>

        <button id="send-btn" onclick="sendMessage()"
                class="send-btn flex-shrink-0 bg-bia-base hover:bg-bia-deep active:scale-95 text-white
                       rounded-2xl p-3 transition-all duration-150 shadow-md shadow-purple-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <p class="text-center text-xs text-gray-400 mt-2 leading-tight">
        Bia é uma assistente virtual · Não substitui atendimento presencial
      </p>
    </div>
  </footer>

  <!-- ══ SCRIPT ═══════════════════════════════════════════════════════════ -->
  <script>
  const SESSION_ID = (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });

  const QUICK_PROMPTS = [
    'O que é o INDE e as Pedras?',
    'Quais programas de inglês existem?',
    'Como funciona o Ponto de Virada?',
    'Não sei meu RA, como consigo?',
  ];

  const EMOJIS = [
    '😊','😄','😁','🥰','😍','🤗','😅',
    '😢','😔','😰','😭','🥺','😤','😮',
    '🙏','👍','👏','🙌','💪','✌️','🤝',
    '❤️','💜','💛','🌟','⭐','✨','🎉',
    '📚','✏️','🎓','🏫','💡','📝','🔍',
  ];

  const WELCOME_MESSAGE =
    `Olá! Eu sou a **Bia**, sua assistente psicopedagógica da Passos Mágicos 🌟\n\n` +
    `Estou aqui para te apoiar na sua jornada de aprendizado, seja para entender seus indicadores, ` +
    `descobrir programas disponíveis ou conversar sobre os seus estudos.\n\n` +
    `Para personalizar o atendimento, poderia me informar o seu **RA (Registro do Aluno)**? ` +
    `Você encontra esse número na carteirinha ou pode pedir à coordenação. 😊`;

  let isLoading = false;

  // ── Init ───────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    appendBotMessage(WELCOME_MESSAGE, false);
    renderQuickPrompts();
    buildEmojiPanel();
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#emoji-btn') && !e.target.closest('#emoji-panel')) {
        document.getElementById('emoji-panel').classList.remove('open');
      }
    });
  });

  // ── Emoji ──────────────────────────────────────────────────────────────
  function buildEmojiPanel() {
    document.getElementById('emoji-panel').innerHTML =
      EMOJIS.map(e => `<button onclick="insertEmoji('${e}')">${e}</button>`).join('');
  }

  function toggleEmoji(e) {
    e.stopPropagation();
    document.getElementById('emoji-panel').classList.toggle('open');
  }

  function insertEmoji(emoji) {
    const input = document.getElementById('msg-input');
    const s = input.selectionStart ?? input.value.length;
    const en = input.selectionEnd   ?? input.value.length;
    input.value = input.value.slice(0, s) + emoji + input.value.slice(en);
    input.selectionStart = input.selectionEnd = s + emoji.length;
    input.focus();
    autoResize(input);
    document.getElementById('emoji-panel').classList.remove('open');
  }

  // ── Quick prompts ──────────────────────────────────────────────────────
  function renderQuickPrompts() {
    document.getElementById('quick-prompts').innerHTML = QUICK_PROMPTS.map(p => `
      <button onclick="quickSend(this.dataset.text)"
        data-text="${p.replace(/"/g, '&quot;')}"
        class="flex-shrink-0 text-xs bg-bia-light text-bia-base border border-bia-mid/40
               px-3 py-1.5 rounded-full whitespace-nowrap font-medium
               hover:bg-bia-base hover:text-white hover:border-bia-base
               active:bg-bia-deep active:text-white
               transition-all duration-150">
        ${p.length > 38 ? p.slice(0, 36) + '…' : p}
      </button>`).join('');
  }

  function quickSend(text) {
    if (isLoading) return;
    document.getElementById('msg-input').value = text;
    sendMessage();
  }

  // ── Send ───────────────────────────────────────────────────────────────
  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    appendUserMessage(text);
    setLoading(true);
    const reply = await callAPI(text);
    setLoading(false);
    appendBotMessage(reply);
  }

  // ── API ────────────────────────────────────────────────────────────────
  async function callAPI(userMessage) {
    try {
      const ctrl    = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 30_000);
      const res = await fetch('/api/chat', {
        method:  'POST',
        signal:  ctrl.signal,
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: userMessage, sessionId: SESSION_ID }),
      });
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return data.reply || 'Desculpe, não recebi uma resposta válida. Pode tentar de novo?';
    } catch (err) {
      if (err.name === 'AbortError') {
        showToast('A resposta demorou demais. Tente novamente.');
        return 'A conexão demorou mais que o esperado. Pode tentar novamente? 😊';
      }
      console.error('[Bia]', err);
      return getFallback(userMessage);
    }
  }

  // ── Fallback ───────────────────────────────────────────────────────────
  function getFallback(text) {
    const t = text.toLowerCase();
    if (t.includes('inde'))
      return '**INDE** é o Índice de Desenvolvimento Educacional, a nota geral que resume seu crescimento no programa (escala 0–10).\n\nEle considera seu desempenho, engajamento e bem-estar. Quanto maior, melhor está seu desenvolvimento! 🌟\n\n*Estou sem conexão no momento, mas respondo mais perguntas assim que voltar.*';
    if (t.includes('pedra') || t.includes('quartzo') || t.includes('topázio'))
      return 'As **Pedras** são a classificação pelo INDE:\n- 🔴 **Quartzo** (< 5,5): fase de atenção\n- 🟠 **Ágata** (5,5–7,0): em desenvolvimento\n- 🔵 **Ametista** (7,0–8,5): bom progresso\n- 🟢 **Topázio** (≥ 8,5): excelência!\n\n*Sem conexão agora. Tente novamente em instantes.*';
    if (t.includes('ra') || t.includes('registro'))
      return 'Seu **RA (Registro do Aluno)** é o número que identifica você no programa. Você encontra na sua carteirinha ou pode pedir à coordenação da Passos Mágicos! 😊\n\n*Estou com dificuldade de conexão agora. Tente novamente em breve.*';
    return 'Olá! Estou com dificuldade de conexão no momento. 😅\nPor favor, aguarde alguns instantes e tente novamente. Estou aqui para te ajudar!';
  }

  // ── Messages ───────────────────────────────────────────────────────────
  function appendUserMessage(text) {
    const chat = document.getElementById('chat');
    const div  = document.createElement('div');
    div.className = 'flex justify-end animate-slide-up';
    div.innerHTML = `
      <div class="user-bubble text-white text-sm px-4 py-2.5 rounded-2xl rounded-br-sm
                  max-w-[82%] leading-relaxed">
        ${escapeHtml(text)}
      </div>`;
    chat.appendChild(div);
    scrollBottom();
  }

  function appendBotMessage(text, animate = true) {
    const chat = document.getElementById('chat');
    const div  = document.createElement('div');
    div.className = 'flex justify-start' + (animate ? ' animate-slide-up' : '');
    div.innerHTML = `
      <div class="flex gap-2 max-w-[88%]">
        <img src="/bia_avatar.png" alt="Bia" class="flex-shrink-0 w-8 h-8 mt-0.5 select-none">
        <div class="bot-bubble text-bia-ink text-sm px-4 py-2.5 rounded-2xl rounded-bl-sm leading-relaxed md">
          ${renderMarkdown(text)}
        </div>
      </div>`;
    chat.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const div  = document.createElement('div');
    div.id        = 'typing-indicator';
    div.className = 'flex justify-start animate-fade-in';
    div.innerHTML = `
      <div class="flex gap-2 items-end">
        <img src="/bia_avatar.png" alt="Bia" class="flex-shrink-0 w-8 h-8 select-none">
        <div class="bot-bubble px-4 py-3.5 rounded-2xl rounded-bl-sm">
          <div class="flex gap-1.5 items-center" style="height:16px">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>`;
    chat.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function setLoading(v) {
    isLoading = v;
    document.getElementById('send-btn').disabled  = v;
    document.getElementById('msg-input').disabled = v;
    if (v) showTyping(); else removeTyping();
  }

  function showToast(msg) {
    const el = document.getElementById('error-toast');
    el.textContent = msg;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 4000);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function scrollBottom() {
    const scroller = document.getElementById('chat-scroll');
    setTimeout(() => { scroller.scrollTop = scroller.scrollHeight; }, 50);
  }

  function escapeHtml(t) {
    return t
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
  }

  function renderMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,     '<em>$1</em>')
      .replace(/^### (.*)/gm,   '<h3>$1</h3>')
      .replace(/^## (.*)/gm,    '<h3>$1</h3>')
      .replace(/^\| (.*) \|$/gm, (_, row) => {
        const cells = row.split(' | ').map(c => `<td>${c}</td>`).join('');
        return `<tr>${cells}</tr>`;
      })
      .replace(/(<tr>[\s\S]*?<\/tr>\n?)+/g, m => `<table>${m}</table>`)
      .replace(/^[-•] (.*)/gm,  '<li>$1</li>')
      .replace(/^\d+\. (.*)/gm, '<li>$1</li>')
      .replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      .replace(/`(.*?)`/g,      '<code>$1</code>')
      .replace(/\n/g,           '<br>');
  }
  </script>
</body>
</html>
